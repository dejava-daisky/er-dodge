name: Refresh DAK.GG statistics

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-dakgg-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect DAK.GG statistics
        run: python scripts/collect_dakgg_stats.py

      - name: Create data release when missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view dakgg-data >/dev/null 2>&1; then
            gh release create dakgg-data \
              --title "DAK.GG statistics data" \
              --notes "Automatically refreshed runtime statistics for ER Dodge Check." \
              --latest=false
          fi

      - name: Upload refreshed runtime data
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload dakgg-data data/dakgg_stats.json.gz --clobber
