<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>ER DODGE CHECK - 점검 안내</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
            background: #100b10;
            color: #fff7f8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 32px 18px;
            background:
                radial-gradient(circle at 50% 10%, rgba(212, 44, 82, 0.22), transparent 42%),
                #100b10;
        }

        main {
            width: min(920px, 100%);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            background: rgba(25, 18, 24, 0.94);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
        }

        img {
            display: block;
            width: 100%;
            max-height: 520px;
            object-fit: cover;
            object-position: center;
        }

        section {
            padding: 30px 34px 34px;
        }

        .eyebrow {
            margin: 0 0 10px;
            color: #ff6f91;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.18em;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 1.15;
        }

        p {
            margin: 0;
            color: #dfd4d8;
            font-size: clamp(1rem, 2.6vw, 1.16rem);
            line-height: 1.75;
            word-break: keep-all;
        }

        .schedule {
            margin-top: 24px;
            padding: 16px 18px;
            border-left: 4px solid #e83f69;
            border-radius: 8px;
            background: rgba(232, 63, 105, 0.1);
            color: #fff;
            font-weight: 700;
        }

        time {
            color: #ff91aa;
        }

        @media (max-width: 600px) {
            body {
                padding: 16px 12px;
            }

            main {
                border-radius: 14px;
            }

            img {
                max-height: 360px;
            }

            section {
                padding: 24px 22px 28px;
            }
        }
    </style>
</head>
<body>
    <main>
        <img src="/maintenance.png" alt="점검 안내 이미지">
        <section>
            <p class="eyebrow">TEMPORARY MAINTENANCE</p>
            <h1>잠시 점검 중입니다.</h1>
            <p>
                죄송합니다. API 관련 작업으로 인해 현재 정돈된 정보를 제공하기 어려워
                서비스를 잠시 내리게 되었습니다.
            </p>
            <p class="schedule">
                작업 완료 예정:
                <time datetime="2026-06-16T21:00:00+09:00">2026/06/16 21:00까지</time>
            </p>
        </section>
    </main>
</body>
</html>
